# Iṣlāḥ — Bug Pipeline Data Schema
# Version: 0.1
#
# A "bug" is a first-class work entity, stored alongside tasks in the work system
# (~/.aos/islah/ at runtime; never in this repo). Progressive: only id, title,
# status are required. Everything else fills in as the item moves through the pipeline.
#
# Lifecycle:
#   new → triaging → needs-info ⤴          (bounce back to reporter for a repro)
#                  → confirmed              (bug located in code)
#                  → needs-decision         (feature, or conflicts with a prior sign-off)
#                  → fixing → verifying → awaiting-approval → approved → shipped
#   Any state → reopened  (fix didn't stick — history is appended, never rewritten)
#   Any state → duplicate | wont-fix
#
# Two kinds share the pipeline but diverge at triage:
#   kind: bug     → the fix loop (reproduce → gate → prove → approve)
#   kind: feature → the backlog (spawns a project/task, no repro gate)

entities:

  bug:
    required:
      id: string            # per-app scoped: qg#1, dod#1 (qg = quran-garden)
      title: string         # one-line, actionable
      status: enum          # new|triaging|needs-info|confirmed|needs-decision|fixing|verifying|awaiting-approval|approved|shipped|reopened|duplicate|wont-fix
    optional:
      kind: enum            # bug | feature            (default: bug)
      app: string           # registered app id (see config/islah-apps.yaml)

      # --- provenance ---
      source: enum          # apple-notes|in-app|testflight|whatsapp|imessage|asc-crash|manual
      source_ref: string    # note id / message id / crash id / feedback id
      reporter: string      # person name, or "self"
      reported: datetime

      # --- environment (auto-captured where possible) ---
      app_version: string
      build: string
      device: string
      os: string
      screen: string        # route / screen name (e.g. "Study mode")

      # --- the report ---
      symptom: string       # what's wrong, in the reporter's words
      expected: string
      actual: string
      repro_steps: list
      reproducible: enum     # yes | no | unknown

      # --- triage ---
      severity: integer      # 1 (critical) .. 4 (low); 0 = untriaged
      classification: enum    # crash|visual|logic|ux|data|feature|not-a-bug
      dedup_group: string     # cluster id — merges duplicates instead of spawning new
      lane: enum              # auto | operator-in-loop

      # --- code confirmation (the "confirmed in code" stage) ---
      confirmed: bool         # located in source, not just restated
      root_cause: string
      code_refs: list         # ["WordTranslationStore.swift:157", ...]
      fix_approach: string
      conflict: string        # e.g. "reverses qt#33" — forces needs-decision

      # --- linkage ---
      task: string            # work-system task id for the fix

      # --- attempts (append-only history; a reopen adds, never overwrites) ---
      attempts: list          # {n:int, hypothesis, sha, gate_result:pass|fail, at:datetime}

      # --- proof + approval ---
      proof: list             # {kind: before|after, path_or_url, at}
      approval: enum          # pending | approved | amended | rejected
      approved_by: string
      approved_at: datetime

      # --- misc ---
      attachments: list       # screenshots, videos, logs (paths under ~/.aos/islah/media/)
      tags: list
      notes: string
      created: datetime
      updated: datetime
