apps:
  quran-garden:
    prefix: qg
    display: Quran Garden
    repo: /Volumes/AOS-X/project/quran-tools
    release: script/release
    scheme: QuranTools
    build_current: 55
    real_paths:
    - 'Study mode: open a surah, read ayah-by-ayah'
    - 'Word card: tap/long-press a word'
    - 'Top bar: tap to show/hide while reading'
  deenoverdunya:
    prefix: dod
    display: Deen Over Dunya
    repo: /Volumes/AOS-X/project/deenoverdunya
    release: script/release
    real_paths:
    - 'Today screen: prayer dial + strip'
    - 'Athan: fires full, rings through silent (device only)'
    - Maghrib cross-midnight write path (device, real history)
  qg-web:
    prefix: qgw
    display: Quran Garden (web)
    platform: web
    repo: /Users/agentalhadi/quran-garden
    serve: src/server.mjs
    url: https://qg.hish.am
    context: Node/ESM reading web app + email magic-link auth. Verify with a headless
      browser (Playwright/Chrome) screenshot, not Xcode. No TestFlight; ships by restarting
      the node service.
    real_paths:
    - Open a surah, read
    - Magic-link sign-in
    - Search
